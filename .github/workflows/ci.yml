name: Anar MVP CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # 1. NestJS Matrix (Tests all Node services in parallel)
  test-nestjs:
    name: Test NestJS (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Added ai-bridge-service here!
        service: [goal-service, task-service, notification-service, ai-bridge-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Updated path to point inside the new backend folder
          cache-dependency-path: backend/services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies & Test
        # Updated path here as well
        working-directory: backend/services/${{ matrix.service }}
        run: |
          npm ci
          npm run test --if-present

  # 2. .NET Build & Test
  test-dotnet:
    name: Test .NET (auth-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' # Upgraded to match the auth-service framework

      - name: Restore, Build, and Test
        # Updated path to point inside the new backend folder
        working-directory: backend/services/auth-service
        run: |
          dotnet restore
          dotnet build --no-restore
          dotnet test --no-build --verbosity normal

  # 3. Python Build & Test
  test-python:
    name: Test Python (ai-logic)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies & Test
        # Updated path to point to the new top-level ai-logic folder
        working-directory: ai-logic
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pytest

  # 4. Docker Build Validation
  docker-dry-run:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    needs: [test-nestjs, test-dotnet, test-python] # Only runs if tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env for build validation
        run: |
          cp .env.example .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=anar_db" >> .env
          echo "DEEPSEEK_API_KEY=dummy_key_for_ci" >> .env

      - name: Build Docker Containers
        # This remains the same because docker-compose.yml is at the root
        run: docker compose build