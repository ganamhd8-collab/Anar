version: '3.9'

services:

  # ── ai-bridge-service ──────────────────────────────────────────────────────
  ai-bridge:
    build:
      context: ./ai-bridge-service
      dockerfile: Dockerfile
    container_name: ai-bridge-service
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - ./ai-bridge-service/.env
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── notification-service ───────────────────────────────────────────────────
  notification:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./notification-service/.env
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL (for notification-service) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    ports:
      - '5432:5432'             # expose only if you need a local DB client (e.g. TablePlus)
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

# ── Shared network ─────────────────────────────────────────────────────────────
# Both services can reach each other and postgres by container name as hostname.
# e.g. from notification-service: DB_HOST=postgres
networks:
  app-network:
    driver: bridge

# ── Named volume (postgres data persists across container restarts) ────────────
volumes:
  postgres-data: