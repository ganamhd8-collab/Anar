services:
  auth-service:
    build:
      context: .
      dockerfile: ./backend/services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  goal-service:
    build:
      context: .
      dockerfile: ./backend/services/goal-service/Dockerfile
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: ./backend/services/task-service/Dockerfile
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: ./backend/services/notification-service/Dockerfile
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  ai-bridge-service:
    build:
      context: .
      dockerfile: ./backend/services/ai-bridge-service/Dockerfile
    ports:
      - "3006:3006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  ai-logic:
    build:
      context: .
      dockerfile: ./ai-logic/Dockerfile
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Updated path: Now points to backend/shared/migrations
      - ./backend/shared/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025" # SMTP port for NestJS to send emails to
      - "8025:8025" # Web UI port for you to view the emails
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  postgres_data: