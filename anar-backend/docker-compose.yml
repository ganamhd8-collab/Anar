version: "3.8"

services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres

  goal-service:
    build: ./services/goal-service
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - postgres

  task-service:
    build: ./services/task-service
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      - postgres

  ai-bridge-service:
    build: ./services/ai-bridge-service
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      - postgres

  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
